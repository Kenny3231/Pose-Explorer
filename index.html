<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pose Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-mode-switch { animation: fadeInScale 0.4s ease-out forwards; }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-animate { animation: modalPop 0.2s ease-out forwards; }
        
        .grid-item:hover img { transform: translateY(-8px); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        select { appearance: none; -webkit-appearance: none; }
        /* Permet de styliser légèrement le bouton pour vider l'input (croix native) */
        input[type="text"]::-webkit-search-cancel-button { cursor: pointer; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 sm:p-6 md:p-8 overflow-x-hidden">

    <div class="w-full">
        <header class="bg-slate-900 p-6 sm:p-10 rounded-[3rem] border border-slate-800 shadow-2xl mb-10">
            <div class="flex flex-col xl:flex-row justify-between items-center gap-8 xl:gap-10">
                
                <div class="text-center xl:text-left">
                    <h1 class="text-4xl sm:text-5xl font-black text-yellow-500 italic leading-none tracking-tighter">Pose Explorer</h1>
                    <p id="stats" class="text-[10px] text-slate-500 uppercase font-black mt-3 tracking-[0.3em] opacity-50 italic">Initialisation...</p>
                </div>

                <div class="flex flex-col md:flex-row items-center gap-5 w-full xl:w-auto justify-center flex-1">
                    <div class="bg-black/40 p-6 rounded-[2.5rem] border border-slate-700 flex flex-col gap-1 w-full md:w-80 shadow-inner">
                        <input type="text" id="name1" oninput="save()" placeholder="Utilisateur 1" 
                               class="bg-transparent text-yellow-500 font-black text-3xl sm:text-4xl outline-none tracking-tighter placeholder:text-yellow-900/20">
                        <input type="text" id="id1" oninput="saveAndRender()" placeholder="ID Bitmoji 1" 
                               class="bg-transparent text-slate-600 text-sm font-mono outline-none border-t border-slate-800/50 pt-2">
                    </div>

                    <button onclick="swapIds()" class="p-4 bg-slate-800 hover:bg-yellow-500 rounded-full text-yellow-500 hover:text-black transition-all active:scale-90 rotate-90 md:rotate-0 shadow-xl shrink-0">
                        <i data-lucide="arrow-right-left" class="w-6 h-6"></i>
                    </button>

                    <div class="bg-black/40 p-6 rounded-[2.5rem] border border-slate-700 flex flex-col gap-1 w-full md:w-80 shadow-inner">
                        <input type="text" id="name2" oninput="save()" placeholder="Utilisateur 2" 
                               class="bg-transparent text-blue-400 font-black text-3xl sm:text-4xl outline-none tracking-tighter placeholder:text-blue-900/20">
                        <input type="text" id="id2" oninput="saveAndRender()" placeholder="ID Bitmoji 2" 
                               class="bg-transparent text-slate-600 text-sm font-mono outline-none border-t border-slate-800/50 pt-2">
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row items-center gap-4 w-full xl:w-auto justify-center shrink-0">
                    <button onclick="downloadAllAsZip()" id="zipBtn" class="w-full sm:w-auto flex-1 bg-yellow-500 hover:bg-yellow-400 text-black px-12 py-6 rounded-[2rem] font-black text-xl flex items-center justify-center gap-4 transition-all shadow-2xl shadow-yellow-500/20 active:scale-95 whitespace-nowrap">
                        <i data-lucide="folder-archive" class="w-7 h-7"></i> GÉNÉRER ZIP
                    </button>

                    <button onclick="openHelp()" title="Centre d'aide" class="w-full sm:w-auto shrink-0 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-yellow-500 p-6 rounded-[2rem] transition-all shadow-xl active:scale-95 flex items-center justify-center group">
                        <i data-lucide="circle-help" class="w-7 h-7 group-hover:scale-110 transition-transform"></i>
                    </button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-4 mb-12 items-stretch">
            
            <div class="flex bg-slate-900 rounded-[1.5rem] p-1.5 border border-slate-800 col-span-2 md:col-span-1 shadow-lg h-[60px]">
                <button onclick="setMode('solo')" id="btn-solo" class="flex-1 rounded-xl font-black transition-all text-xs tracking-[0.2em]">SOLO</button>
                <button onclick="setMode('duo')" id="btn-duo" class="flex-1 rounded-xl font-black transition-all text-xs tracking-[0.2em]">DUO</button>
            </div>
            
            <div class="relative group h-[60px] col-span-1">
                <select id="langSelect" onchange="changeLanguage()" 
                        class="w-full h-full bg-slate-900 border border-slate-800 px-6 rounded-[1.5rem] outline-none text-xs font-black tracking-widest cursor-pointer shadow-lg pr-12 text-slate-300 focus:border-yellow-500">
                    <option value="fr">🇫🇷 FR</option>
                    <option value="en">🇬🇧 EN</option>
                </select>
                <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500 group-hover:text-yellow-500 transition-colors">
                    <i data-lucide="globe" class="w-5 h-5"></i>
                </div>
            </div>

            <div class="relative group h-[60px] col-span-1">
                <select id="scaleSelect" onchange="render()" 
                        class="w-full h-full bg-slate-900 border border-slate-800 px-6 rounded-[1.5rem] outline-none text-xs font-black tracking-widest cursor-pointer shadow-lg pr-12 text-slate-300 focus:border-yellow-500">
                    <option value="1" selected>WEB (1x)</option>
                    <option value="2" >HD (2x)</option>
                    <option value="4">ULTRA (4x)</option>
                </select>
                <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500 group-hover:text-yellow-500 transition-colors">
                    <i data-lucide="monitor" class="w-5 h-5"></i>
                </div>
            </div>

            <div class="relative group h-[60px] col-span-2 md:col-span-1 xl:col-span-1">
                <input type="search" id="categoryInput" list="categoryList" oninput="render()" placeholder="Catégorie..." 
                       class="w-full h-full bg-slate-900 border border-slate-800 px-6 rounded-[1.5rem] outline-none text-xs font-black tracking-widest cursor-text shadow-lg pr-12 text-slate-300 focus:border-yellow-500 placeholder:text-slate-600">
                <datalist id="categoryList">
                    </datalist>
                <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500 group-hover:text-yellow-500 transition-colors">
                    <i data-lucide="filter" class="w-5 h-5"></i>
                </div>
            </div>

            <div class="relative col-span-2 md:col-span-2 xl:col-span-2 h-[60px]">
                <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-600"></i>
                <input type="search" id="search" oninput="render()" placeholder="Rechercher (ex: sourire, amour)..." 
                       class="w-full h-full bg-slate-900 border border-slate-800 px-14 rounded-[1.5rem] outline-none focus:border-yellow-500 font-bold shadow-lg text-sm placeholder:text-slate-600 placeholder:font-normal">
            </div>
        </div>

        <div id="grid-container">
            <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 2xl:grid-cols-10 gap-4 md:gap-6 lg:gap-8"></div>
        </div>
    </div>

    <div id="helpLightbox" class="fixed inset-0 bg-slate-950/98 backdrop-blur-xl z-50 hidden flex items-center justify-center p-4 sm:p-8" onclick="closeHelp()">
        <div class="relative max-w-2xl w-full bg-slate-900 border border-slate-800 rounded-[3rem] p-8 sm:p-12 modal-animate text-left shadow-2xl" onclick="event.stopPropagation()">
            
            <button onclick="closeHelp()" class="absolute top-8 right-8 text-slate-500 hover:text-white transition-all hover:rotate-90">
                <i data-lucide="x" class="w-8 h-8"></i>
            </button>
            
            <h2 class="text-3xl sm:text-4xl font-black text-yellow-500 italic tracking-tighter mb-8 flex items-center gap-4">
                <i data-lucide="book-open" class="w-8 h-8"></i> CENTRE D'AIDE
            </h2>

            <div id="helpContent" class="text-slate-300 space-y-6">
                <div class="flex items-center gap-3 text-slate-500 animate-pulse">
                    <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Chargement des données...
                </div>
            </div>
        </div>
    </div>

    <div id="lightbox" class="fixed inset-0 bg-slate-950/98 backdrop-blur-xl z-50 hidden flex items-center justify-center p-8" onclick="closeLightbox()">
        <div class="relative max-w-2xl w-full modal-animate flex flex-col items-center text-center" onclick="event.stopPropagation()">
            
            <button onclick="closeLightbox()" class="absolute -top-16 right-0 text-slate-500 hover:text-white transition-all hover:rotate-90">
                <i data-lucide="x" class="w-12 h-12"></i>
            </button>
            
            <div class="bg-gradient-to-b from-slate-900/50 to-transparent p-10 rounded-full mb-10 border border-slate-800/50">
                <img id="lightbox-img" src="" class="max-h-[50vh] sm:max-h-[55vh] drop-shadow-[0_0_50px_rgba(234,179,8,0.25)] object-contain">
            </div>

            <h3 id="lightbox-title" class="text-3xl sm:text-4xl font-black uppercase tracking-tighter text-yellow-500">Nom de la Pose</h3>
            <p id="lightbox-res" class="text-slate-600 text-[10px] mt-3 uppercase font-black tracking-[0.4em]">PNG Transparent</p>
            
            <div class="mt-12 w-full flex flex-col sm:flex-row justify-center gap-4">
                <button id="copyBtn" class="bg-slate-800 text-white px-10 py-5 rounded-full font-black text-sm hover:bg-slate-700 transition-all flex items-center justify-center gap-4 shadow-2xl active:scale-95 group">
                    <i data-lucide="copy" class="w-5 h-5 group-hover:scale-110 transition-transform"></i> COPIER L'IMAGE
                </button>
                <button id="singleDlBtn" class="bg-white text-black px-10 py-5 rounded-full font-black text-sm hover:bg-yellow-500 transition-all flex items-center justify-center gap-4 shadow-2xl active:scale-95 group">
                    <i data-lucide="download" class="w-5 h-5 group-hover:translate-y-1 transition-transform"></i> ENREGISTRER PNG
                </button>
            </div>
        </div>
    </div>

    <script>
        let rawData = { categories: [], imoji: [], friends: [] };
        let currentMode = 'solo';

        // Fonction pour nettoyer le nom des images proprement
        function formatPoseName(str) {
            if (!str) return "pose";
            return str
                .normalize("NFD") // Sépare les lettres de leurs accents
                .replace(/[\u0300-\u036f]/g, "") // Supprime les accents (é -> e)
                .replace(/'/g, " ") // Remplace les apostrophes par un espace
                .toLowerCase() // Met tout en minuscules
                .replace(/[^a-z0-9 ]/g, "_") // Remplace tout le reste (symboles bizarres) par des _
                .trim(); // Enlève les espaces en trop au début et à la fin
        }
        function normalizeStr(str) {
            if (!str) return "";
            return str.toString()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toLowerCase();
        }

        window.onload = async () => {
            document.getElementById('id1').value = localStorage.getItem('bt_id1') || "";
            document.getElementById('id2').value = localStorage.getItem('bt_id2') || "";
            document.getElementById('name1').value = localStorage.getItem('bt_name1') || "";
            document.getElementById('name2').value = localStorage.getItem('bt_name2') || "";
            lucide.createIcons();
            
            await loadData('fr');
        };

        async function loadData(lang) {
            try {
                const response = await fetch(`./templates_${lang}.json`);
                const json = await response.json();
                rawData = json;
                
                document.getElementById('stats').innerText = `${rawData.imoji.length + rawData.friends.length} POSES RÉPERTORIÉES`;
                
                const categoriesMap = new Map();
                const allItems = [...rawData.imoji, ...rawData.friends];
                allItems.forEach(item => {
                    if(item.categories && Array.isArray(item.categories)) {
                        item.categories.forEach(c => {
                            const catName = typeof c === 'string' ? c : (c.name || "");
                            if (catName) {
                                categoriesMap.set(normalizeStr(catName), catName);
                            }
                        });
                    }
                });

                // Remplissage de la datalist
                const catList = document.getElementById('categoryList');
                catList.innerHTML = ''; // On vide l'ancienne liste
                
                const sortedKeys = Array.from(categoriesMap.keys()).sort();
                sortedKeys.forEach(normCat => {
                    const originalName = categoriesMap.get(normCat);
                    // On injecte les options dans la datalist
                    catList.innerHTML += `<option value="${originalName.toUpperCase()}"></option>`;
                });
                
                setMode(currentMode);
            } catch (err) { 
                document.getElementById('stats').innerText = "ERREUR CATALOGUE (Fichiers introuvables)"; 
                console.error(err);
            }
        }

        // --- GESTION DE LA MODALE D'AIDE ---
        async function openHelp() {
            document.getElementById('helpLightbox').classList.remove('hidden');
            const helpContent = document.getElementById('helpContent');
            
            try {
                const res = await fetch('./aide.json');
                const aideDonnees = await res.json();
                
                // Formater l'affichage avec le JSON
                helpContent.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                        <div class="bg-slate-950 p-6 rounded-3xl border border-slate-800">
                            <h4 class="text-xs font-black tracking-widest text-slate-500 mb-2">CATALOGUE FR 🇫🇷</h4>
                            <p class="text-2xl font-black text-slate-200">${aideDonnees.stats.fr.solo} <span class="text-sm font-normal text-slate-500">SOLO</span></p>
                            <p class="text-2xl font-black text-slate-200">${aideDonnees.stats.fr.duo} <span class="text-sm font-normal text-slate-500">DUO</span></p>
                        </div>
                        <div class="bg-slate-950 p-6 rounded-3xl border border-slate-800">
                            <h4 class="text-xs font-black tracking-widest text-slate-500 mb-2">CATALOGUE EN 🇬🇧</h4>
                            <p class="text-2xl font-black text-slate-200">${aideDonnees.stats.en.solo} <span class="text-sm font-normal text-slate-500">SOLO</span></p>
                            <p class="text-2xl font-black text-slate-200">${aideDonnees.stats.en.duo} <span class="text-sm font-normal text-slate-500">DUO</span></p>
                        </div>
                    </div>
                    
                    <div class="bg-blue-900/20 border border-blue-500/20 p-6 rounded-3xl">
                        <h4 class="text-xs font-black tracking-widest text-blue-400 mb-4 uppercase">Mode d'emploi</h4>
                        <p class="text-slate-300 leading-relaxed whitespace-pre-line">${aideDonnees.guide}</p>
                    </div>

                    <div class="text-center mt-6">
                        <p class="text-[10px] font-black tracking-[0.3em] text-slate-600 uppercase">Dernière mise à jour : ${aideDonnees.date_maj}</p>
                    </div>
                `;
            } catch (e) {
                helpContent.innerHTML = `
                    <div class="bg-red-900/20 text-red-400 p-6 rounded-2xl border border-red-500/20">
                        <p><i data-lucide="alert-triangle" class="inline w-5 h-5 mr-2"></i> Impossible de charger le fichier <strong>aide.json</strong>.</p>
                        <p class="text-sm mt-2 opacity-80">Assurez-vous d'avoir créé le fichier à la racine de votre dossier.</p>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function closeHelp() {
            document.getElementById('helpLightbox').classList.add('hidden');
        }
        // -----------------------------------

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            loadData(lang);
        }

        function save() {
            localStorage.setItem('bt_id1', document.getElementById('id1').value);
            localStorage.setItem('bt_id2', document.getElementById('id2').value);
            localStorage.setItem('bt_name1', document.getElementById('name1').value);
            localStorage.setItem('bt_name2', document.getElementById('name2').value);
        }

        function saveAndRender() { save(); render(); }

        function swapIds() {
            const i1 = document.getElementById('id1'), i2 = document.getElementById('id2');
            const n1 = document.getElementById('name1'), n2 = document.getElementById('name2');
            [i1.value, i2.value] = [i2.value, i1.value];
            [n1.value, n2.value] = [n2.value, n1.value];
            saveAndRender();
        }

        function setMode(mode) {
            currentMode = mode;
            const isS = mode === 'solo';
            document.getElementById('btn-solo').className = isS ? 'flex-1 rounded-xl bg-yellow-500 text-black font-black shadow-lg shadow-yellow-500/20' : 'flex-1 text-slate-500 hover:text-white';
            document.getElementById('btn-duo').className = !isS ? 'flex-1 rounded-xl bg-yellow-500 text-black font-black shadow-lg shadow-yellow-500/20' : 'flex-1 text-slate-500 hover:text-white';
            
            const container = document.getElementById('grid-container');
            container.classList.remove('animate-mode-switch');
            void container.offsetWidth; 
            container.classList.add('animate-mode-switch');
            
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            const search = normalizeStr(document.getElementById('search').value);
            const scale = document.getElementById('scaleSelect').value;
            // On récupère le texte tapé dans l'input catégorie
            const categoryInput = normalizeStr(document.getElementById('categoryInput').value); 
            const id1 = document.getElementById('id1').value || "%s", id2 = document.getElementById('id2').value || "%s";
            
            const list = currentMode === 'solo' ? rawData.imoji : rawData.friends;

            grid.innerHTML = list.filter(t => {
                const normalizedKeywords = normalizeStr(t.keywords);
                const matchSearch = normalizedKeywords.includes(search);
                
                let matchCategory = true;
                // Si l'utilisateur a tapé quelque chose dans catégorie
                if (categoryInput !== '') {
                    // On cherche si une catégorie de l'image contient le texte tapé (ex: "amo" trouvera "AMOUR")
                    matchCategory = t.categories && t.categories.some(c => normalizeStr(c).includes(categoryInput));
                }
                
                return matchSearch && matchCategory;
            }).map(t => {
                let url = t.src.replace('%s', id1);
                if(url.includes('%s')) url = url.replace('%s', id2);
                url += `?transparent=1&palette=1&scale=${scale}`;
                
                return `
                <div class="grid-item group bg-slate-900/40 p-5 rounded-[2.5rem] border border-slate-800 text-center cursor-pointer hover:border-yellow-500/40 transition-all" onclick="openLightbox('${url}', '${t.displayTag.replace(/'/g, "\\'")}')">
                    <img src="${url}" class="w-full drop-shadow-2xl mb-5 aspect-square object-contain" loading="lazy">
                    <span class="text-[9px] text-slate-600 uppercase font-black tracking-widest block truncate">${t.displayTag}</span>
                </div>`;
            }).join('');
        }

        async function forceDownload(url, filename) {
            const btn = document.getElementById('singleDlBtn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>...`;
            lucide.createIcons();

            try {
                const response = await fetch(url);
                const blob = await response.blob();
                saveAs(blob, filename);
            } catch (e) { alert("Erreur de téléchargement."); }
            
            btn.innerHTML = originalHtml;
            lucide.createIcons();
        }
        async function copyImage(url) {
            const btn = document.getElementById('copyBtn');
            const originalHtml = btn.innerHTML;
            
            // Animation de chargement
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> COPIE...`;
            lucide.createIcons();

            try {
                // On télécharge l'image en mémoire
                const response = await fetch(url);
                const blob = await response.blob();
                
                // On écrit le fichier PNG directement dans le presse-papier
                await navigator.clipboard.write([
                    new ClipboardItem({
                        'image/png': blob
                    })
                ]);
                
                // Animation de succès
                btn.innerHTML = `<i data-lucide="check" class="w-5 h-5 text-green-400"></i> COPIÉ !`;
                btn.classList.add('bg-green-900/30', 'border', 'border-green-500/50');
                lucide.createIcons();
                
            } catch (e) { 
                console.error("Erreur de copie :", e);
                // Animation d'erreur (si le navigateur bloque l'accès)
                btn.innerHTML = `<i data-lucide="x" class="w-5 h-5 text-red-500"></i> ERREUR`;
                lucide.createIcons();
            }

            // Au bout de 2 secondes, on remet le bouton à son état normal
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.classList.remove('bg-green-900/30', 'border', 'border-green-500/50');
                lucide.createIcons();
            }, 2000);
        }

        function openLightbox(url, title) {
            const scale = document.getElementById('scaleSelect').value;
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox-title').innerText = title;
            document.getElementById('lightbox-res').innerText = `FORMAT PNG • RÉSOLUTION ${scale}X`;
            
            const n1 = document.getElementById('name1').value || "Utilisateur1";
            const n2 = document.getElementById('name2').value || "Utilisateur2";
            
            // On nettoie le nom de la pose (sans accents, avec les bons espaces)
            const cleanTitle = formatPoseName(title);
            
            let filename;
            if (currentMode === 'solo') {
                // Mode Solo : Nom1__nom_de_la_pose.png
                filename = `${n1}__${cleanTitle}.png`;
            } else {
                // Mode Duo : Nom1__Nom2__nom_de_la_pose.png
                filename = `${n1}__${n2}__${cleanTitle}.png`;
            }
            
            document.getElementById('copyBtn').onclick = () => copyImage(url);
            document.getElementById('singleDlBtn').onclick = () => forceDownload(url, filename);
            document.getElementById('lightbox').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }

 async function downloadAllAsZip() {
            const zip = new JSZip();
            const btn = document.getElementById('zipBtn');
            const id1 = document.getElementById('id1').value, id2 = document.getElementById('id2').value;
            const n1 = document.getElementById('name1').value || "Utilisateur1";
            const n2 = document.getElementById('name2').value || "Utilisateur2";
            const scale = document.getElementById('scaleSelect').value;
            
            const search = normalizeStr(document.getElementById('search').value);
            const categoryInput = normalizeStr(document.getElementById('categoryInput').value);
            
            if(!id1 || (currentMode === 'duo' && !id2)) return alert("Veuillez renseigner les IDs Bitmoji.");
            
            btn.disabled = true;

            const list = currentMode === 'solo' ? rawData.imoji : rawData.friends;
            const filteredList = list.filter(t => {
                const normalizedKeywords = normalizeStr(t.keywords);
                const matchSearch = normalizedKeywords.includes(search);
                let matchCategory = true;
                if (categoryInput !== '') {
                    matchCategory = t.categories && t.categories.some(c => normalizeStr(c).includes(categoryInput));
                }
                return matchSearch && matchCategory;
            });

            // ÉTAPE 1 : Préparer les tâches et les métadonnées
            const tasks = [];
            const nameCount = {};
            const metadataUser1 = []; 
            const metadataUser2 = []; 
            const metadataDuo = [];   // JSON pour le mode duo
            
            let f1, f2;
            
            if(currentMode === 'solo') { 
                f1 = zip.folder(n1); 
                f2 = zip.folder(n2); 
            }

            for (let t of filteredList) {
                let tag = formatPoseName(t.displayTag);
                nameCount[tag] = (nameCount[tag] || 0) + 1;
                const suf = nameCount[tag] === 1 ? "" : `_${nameCount[tag]}`;
                
                const imgData = {
                    titre: t.displayTag,
                    mots_cles: t.keywords,
                    categories: t.categories || []
                };
                
                if (currentMode === 'solo') {
                    // Pour l'utilisateur 1
                    const filename1 = `${n1}__${tag}${suf}.png`;
                    tasks.push({
                        url: t.src.replace('%s', id1) + `?transparent=1&palette=1&scale=${scale}`,
                        folder: f1,
                        filename: filename1
                    });
                    metadataUser1.push({ fichier: filename1, ...imgData });
                    
                    // Pour l'utilisateur 2
                    if(id2) {
                        const filename2 = `${n2}__${tag}${suf}.png`;
                        tasks.push({
                            url: t.src.replace('%s', id2) + `?transparent=1&palette=1&scale=${scale}`,
                            folder: f2,
                            filename: filename2
                        });
                        metadataUser2.push({ fichier: filename2, ...imgData });
                    }
                } else {
                    // ==========================================
                    // MODE DUO : ON FAIT LES DEUX SENS !
                    // ==========================================
                    
                    // Sens 1 : Utilisateur 1 d'abord, Utilisateur 2 ensuite
                    let url1 = t.src.replace('%s', id1);
                    if(url1.includes('%s')) url1 = url1.replace('%s', id2);
                    
                    const filenameDuo1 = `${n1}__${n2}__${tag}${suf}.png`;
                    tasks.push({
                        url: url1 + `?transparent=1&palette=1&scale=${scale}`,
                        folder: zip,
                        filename: filenameDuo1
                    });
                    metadataDuo.push({ fichier: filenameDuo1, ...imgData });

                    // Sens 2 : Utilisateur 2 d'abord, Utilisateur 1 ensuite (Inversion)
                    let url2 = t.src.replace('%s', id2);
                    if(url2.includes('%s')) url2 = url2.replace('%s', id1);
                    
                    const filenameDuo2 = `${n2}__${n1}__${tag}${suf}.png`;
                    tasks.push({
                        url: url2 + `?transparent=1&palette=1&scale=${scale}`,
                        folder: zip,
                        filename: filenameDuo2
                    });
                    metadataDuo.push({ fichier: filenameDuo2, ...imgData });
                }
            }

            // ÉTAPE 2 : Lancer les téléchargements en parallèle (par lots de 15)
            const BATCH_SIZE = 15;
            let completed = 0;

            for (let i = 0; i < tasks.length; i += BATCH_SIZE) {
                const batch = tasks.slice(i, i + BATCH_SIZE);
                
                btn.innerHTML = `<i data-lucide="loader-2" class="w-7 h-7 animate-spin"></i> ${completed} / ${tasks.length}`;
                lucide.createIcons();

                await Promise.all(batch.map(async (task) => {
                    try {
                        const response = await fetch(task.url);
                        if (!response.ok) throw new Error("Erreur réseau");
                        const blob = await response.blob();
                        task.folder.file(task.filename, blob);
                    } catch (e) {
                        console.warn(`Erreur sur l'image ${task.filename}`);
                    }
                }));
                
                completed += batch.length;
            }

            // ÉTAPE 3 : Création finale du ZIP
            btn.innerHTML = `<i data-lucide="loader-2" class="w-7 h-7 animate-spin"></i> COMPRESSION...`;
            lucide.createIcons();

            if (currentMode === 'solo') {
                f1.file(`metadata_${n1}.json`, JSON.stringify(metadataUser1, null, 2));
                if(id2) f2.file(`metadata_${n2}.json`, JSON.stringify(metadataUser2, null, 2));
            } else {
                // Création du fichier avec le nom exact pour ton Home Assistant
                zip.file(`metadata_Duo.json`, JSON.stringify(metadataDuo, null, 2));
            }

            const content = await zip.generateAsync({type:"blob"});
            saveAs(content, `AvatarForge__${currentMode === 'solo' ? n1 : 'Duo'}.zip`);
            
            // Remise à zéro
            btn.innerHTML = `<i data-lucide="folder-archive" class="w-7 h-7"></i> GÉNÉRER ZIP`;
            btn.disabled = false;
            lucide.createIcons();
        }
    </script>
</body>
</html>
