name: Mise à jour automatique du catalogue

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: # Permet de lancer le script manuellement pour tester

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Autorise la modification du repo

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🟢 Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm' # Optionnel : accélère l'installation si tu as un package-lock.json

      - name: 📦 Installation des dépendances
        run: npm install # À supprimer si tu n'as pas de package.json

      - name: ⚙️ Exécution du script de mise à jour
        run: node get_templates.js

      - name: 📤 Sauvegarde des changements sur GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add templates_fr.json templates_en.json aide.json
          git commit -m "🚀 Mise à jour auto du catalogue [skip ci]" || echo "Pas de changements"
          git push
